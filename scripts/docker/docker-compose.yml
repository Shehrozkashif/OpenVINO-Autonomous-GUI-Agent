services:

  deepseek_ovms:
    image: openvino/model_server:latest
    container_name: deepseek_ovms

    ports:
      - "8001:8000"

    volumes:
      - "${PWD}/models/OpenVINO:/models"

    command:
      - "--model_path"
      - "/models/DeepSeek-R1-Distill-Qwen-7B-int4-ov"
      - "--model_name"
      - "deepseek_llm"
      - "--rest_port"
      - "8000"

    restart: unless-stopped


  phi3_ovms:
    image: openvino/model_server:latest
    container_name: phi3_ovms

    ports:
      - "8002:8000"

    volumes:
      - /home/shehrozbaloch/Desktop/GUI_Agent/intel-openvino-desktop-agent/models/OpenVINO:/models

    command:
      - "--model_path"
      - "/models/Phi-3.5-vision-instruct-int4-ov"
      - "--model_name"
      - "phi3_vision"
      - "--rest_port"
      - "8000"

    restart: unless-stopped