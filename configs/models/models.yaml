deepseek_ovms:
  image: openvino/model_server:latest
  container_name: deepseek_ovms

  ports:
    - "8001:8000"

  volumes:
    - /home/shehrozbaloch/Desktop/GUI_Agent/intel-openvino-desktop-agent/models/OpenVINO:/models

  command:
    - "--source_model"
    - "OpenVINO/DeepSeek-R1-Distill-Qwen-7B-int4-ov"
    - "--model_repository_path"
    - "/models/repo"
    - "--task"
    - "text_generation"
    - "--rest_port"
    - "8000"

  restart: unless-stopped