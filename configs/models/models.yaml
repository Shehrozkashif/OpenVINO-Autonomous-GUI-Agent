# configs/models/models.yaml
vlm:
  name: "OpenVINO/Phi-3.5-vision-instruct-int4-ov"
  model_name_ovms: "phi3_vision"       # must match --model_name in docker-compose
  port: 8002
  temperature: 0.1
  max_tokens: 60

llm:
  name: "OpenVINO/DeepSeek-R1-Distill-Qwen-7B-int4-ov"
  model_name_ovms: "deepseek_llm"      # must match --model_name in docker-compose
  port: 8001
  temperature: 0.7
  max_tokens: 1024

inference:
  device: "AUTO"
  performance_hint: "LATENCY"